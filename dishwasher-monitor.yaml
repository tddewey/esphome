# Bill of Materials
# ─────────────────────────────────────────────────────────────────────────────
# Component               Notes
# ─────────────────────────────────────────────────────────────────────────────
# Wemos D1 Mini (ESP8266) Main controller
# TCS34725 breakout       I2C color sensor (Adafruit #1334 or equivalent)
#                         Sits over the dishwasher LED inside the enclosure
# WS2812B NeoPixel        Single RGB LED; mounts on front of enclosure
# 470Ω resistor           On WS2812B DIN line (logic level protection)
# Decoupling capacitor    100µF across WS2812B 5V/GND (prevents power spikes)
# ─────────────────────────────────────────────────────────────────────────────
#
# Wiring
# ─────────────────────────────────────────────────────────────────────────────
# TCS34725 → D1 Mini
#   VIN → 3.3V
#   GND → GND
#   SDA → D2
#   SCL → D1
#
# WS2812B → D1 Mini
#   5V  → 5V
#   GND → GND
#   DIN → D4 (via 470Ω resistor)
# ─────────────────────────────────────────────────────────────────────────────
#
# Calibration
# ─────────────────────────────────────────────────────────────────────────────
# After first flash, watch the raw RGBC sensor values in HA while the
# dishwasher cycles through each state. Adjust thresholds in the lambda below:
#   - idle threshold:   clear_channel < 200  (increase if false idle triggers)
#   - blue ratio:       blue > red * 1.5 && blue > green * 1.5
#   - white detection:  r/g/b ratios all within 0.25–0.45 of total
# If readings max out (saturation), lower integration_time or gain.
# If sensor is too noisy, increase integration_time (max 614ms) or gain.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  name: dishwasher-monitor
  friendly_name: Dishwasher Monitor
  ap_ssid: Dishwasher-Monitor
  i2c_sda: D2
  i2c_scl: D1
  led_pin: D4

packages:
  board: !include packages/board_esp8266_d1_mini.yaml
  base: !include packages/base.yaml
  diagnostics: !include packages/diagnostics.yaml

i2c:
  sda: ${i2c_sda}
  scl: ${i2c_scl}
  scan: true

light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812
    pin: ${led_pin}
    num_leds: 1
    id: indicator_led
    name: "Dishwasher Indicator"
    restore_mode: ALWAYS_OFF

sensor:
  - platform: tcs34725
    red_channel:
      name: "Dishwasher LED Red"
      id: led_red
    green_channel:
      name: "Dishwasher LED Green"
      id: led_green
    blue_channel:
      name: "Dishwasher LED Blue"
      id: led_blue
    clear_channel:
      name: "Dishwasher LED Clear"
      id: led_clear
    integration_time: 24ms
    gain: 1x
    update_interval: 2s

text_sensor:
  - platform: template
    name: "Dishwasher Status"
    id: dishwasher_status
    update_interval: 5s
    lambda: |-
      float r = id(led_red).state;
      float g = id(led_green).state;
      float b = id(led_blue).state;
      float c = id(led_clear).state;

      if (isnan(r) || isnan(c)) return {"unknown"};
      if (c < 200) return {"idle"};

      // Blue dominant → running
      if (b > r * 1.5 && b > g * 1.5) return {"running"};

      // RGB roughly balanced → white → clean
      float total = r + g + b;
      if (total > 0) {
        float rr = r / total;
        float gr = g / total;
        float br = b / total;
        if (rr > 0.25 && rr < 0.45 && gr > 0.25 && gr < 0.45 && br > 0.20 && br < 0.45)
          return {"clean"};
      }

      return {"unknown"};
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "idle";'
            then:
              - light.turn_off: indicator_led
        - if:
            condition:
              lambda: 'return x == "running";'
            then:
              - light.turn_on:
                  id: indicator_led
                  red: 0%
                  green: 0%
                  blue: 100%
                  brightness: 100%
        - if:
            condition:
              lambda: 'return x == "clean";'
            then:
              - light.turn_on:
                  id: indicator_led
                  red: 100%
                  green: 100%
                  blue: 100%
                  brightness: 100%
        - if:
            condition:
              lambda: 'return x == "unknown";'
            then:
              - light.turn_on:
                  id: indicator_led
                  red: 100%
                  green: 60%
                  blue: 0%
                  brightness: 100%
